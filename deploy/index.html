<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EthonFlow</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14213d;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --panel: #ffffff;
      --bg: #f4f7fb;
      --accent: #0f766e;
      --accent-2: #b7791f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(920px, 100%);
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
      max-width: 680px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    a {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 44px rgba(20, 33, 61, 0.08);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 22px 50px rgba(15, 118, 110, 0.14);
      outline: none;
    }

    strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }

    span {
      color: var(--muted);
      line-height: 1.45;
    }

    .arrow {
      color: var(--accent);
      font-weight: 700;
      margin-top: 24px;
    }

    a:nth-child(2):hover,
    a:nth-child(2):focus-visible {
      border-color: var(--accent-2);
      box-shadow: 0 22px 50px rgba(183, 121, 31, 0.14);
    }

    a:nth-child(2) .arrow {
      color: var(--accent-2);
    }

    @media (max-width: 680px) {
      body {
        place-items: start center;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>EthonFlow</h1>
      <p>Selecciona la version que quieres abrir.</p>
    </header>

    <section class="grid" aria-label="Versiones disponibles">
      <a href="./ethonCOM/">
        <span>
          <strong>Ethon COM</strong>
          Inteligencia operacional comercial.
        </span>
        <span class="arrow">Abrir</span>
      </a>

      <a href="./ethonCEO/">
        <span>
          <strong>Ethon CEO</strong>
          Vista enterprise para direccion y gestion ejecutiva.
        </span>
        <span class="arrow">Abrir</span>
      </a>
    </section>
  </main>
</body>
</html>
